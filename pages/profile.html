    <script>
      async function editProfileBtn() {
        const user = await checkAuth();
        if (user) {
          openSettingsModal();
          showSettingsView('account');
        } else {
          showToast("سجل الدخول اولا");
          openLoginModal();
        }
      }
     const pageLang = document.documentElement.lang || "ar"; // اكتشاف لغة الصفحة
const translationsP = {
  ar: { more: "عرض المزيد", less: "إخفاء" },
  en: { more: "Show more", less: "Less" },
  fr: { more: "Afficher plus", less: "Moins" }
};
const t = translationsP[pageLang] || translationsP.ar;

document.querySelectorAll("[data-limit]").forEach(p => {
  const limit = +p.dataset.limit || 120;
  const fullText = p.textContent.trim();
  if (fullText.length <= limit) return;

  const shortText = fullText.slice(0, limit) + "… ";

  p.innerHTML = 
    `<span class="short">${shortText}</span>
    <span class="more">${t.more}</span>
    <span class="full hidden">${fullText}</span>
    <span class="less hidden"> ${t.less}</span>`
  ;

  const short = p.querySelector(".short");
  const full = p.querySelector(".full");
  const more = p.querySelector(".more");
  const less = p.querySelector(".less");

  let expanded = false;

  p.addEventListener("click", () => {
    expanded = !expanded;
    short.classList.toggle("hidden", expanded);
    more.classList.toggle("hidden", expanded);
    full.classList.toggle("hidden", !expanded);
    less.classList.toggle("hidden", !expanded);
  });
});

const emailEl = document.querySelector('[data-user-email]');
let pressTimer;
emailEl.addEventListener('click', () => {
  const email = emailEl.textContent.trim();
  window.location.href = `mailto:${email}`;
});
emailEl.addEventListener('touchstart', () => {
  pressTimer = setTimeout(() => {
    const email = emailEl.textContent.trim();
    navigator.clipboard.writeText(email);
    showToast('تم نسخ البريد الإلكتروني');
  }, 600);
});
emailEl.addEventListener('touchend', () => {
  clearTimeout(pressTimer);
});

document.querySelectorAll('.user-phone-wrapper').forEach(wrapper => {
  wrapper.addEventListener('click', () => {
    const phone = wrapper.textContent.trim();
    if (!phone) return;

    const cleanPhone = phone.replace(/\s/g, '');

    const overlay = document.createElement('div');
    overlay.className =
      'call-overlay fixed inset-0 z-[9999] bg-black/40 flex justify-center items-end sm:items-center opacity-0 transition-opacity duration-300';
    document.body.appendChild(overlay);

    overlay.classList.add('opacity-100'); // يظهر بالأوباسيتي تدريجياً
    document.body.classList.add('overflow-hidden');

    overlay.innerHTML = `
      <div id="sheet"
        class="w-full max-w-md bg-white rounded-t-2xl sm:rounded-2xl p-6"
        style="
          transform: translateY(100%);
          transition: transform 0.35s cubic-bezier(.22,1,.36,1);
        "
      >
        <div class="space-y-3 text-center font-semibold text-lg">

          <button data-act="call"
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl">
            <i class="fa-solid fa-phone"></i>
            اتصال
          </button>

          <button data-act="sms"
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl">
            <i class="fa-solid fa-comment-sms"></i>
            رسالة SMS
          </button>

          <button data-act="wa"
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl">
            <i class="fa-brands fa-whatsapp"></i>
            واتساب
          </button>

          <button data-act="tg"
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl">
            <i class="fa-brands fa-telegram"></i>
            تيليجرام
          </button>

          <button data-act="copy"
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl">
            <i class="fa-solid fa-copy"></i>
            نسخ الرقم
          </button>

          <button data-act="close"
            class="w-full px-4 py-3 rounded-xl">
            إلغاء
          </button>

        </div>
      </div>
    `;

    const sheet = overlay.querySelector('#sheet');

    // 🔥 الأنيميشن للظهور من الأسفل
    requestAnimationFrame(() => {
      sheet.style.transform = 'translateY(0)';
    });

    function closeSheet() {
      sheet.style.transform = 'translateY(100%)';
      overlay.classList.remove('opacity-100'); // fade out
      setTimeout(() => {
        overlay.remove();
        document.body.classList.remove('overflow-hidden');
      }, 350);
    }

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeSheet();
    });

    overlay.querySelectorAll('[data-act]').forEach(btn => {
      btn.onclick = () => {
        const a = btn.dataset.act;

        if (a === 'call') location.href = `tel:${cleanPhone}`;
        if (a === 'sms') location.href = `sms:${cleanPhone}`;
        if (a === 'wa') window.open(`https://wa.me/213${cleanPhone.slice(1)}`);
        if (a === 'tg') window.open(`tg://resolve?domain=${cleanPhone}`); // يفتح التطبيق مباشرة
        if (a === 'copy') {
          navigator.clipboard.writeText(phone).then(() => {
            showToast('تم نسخ الرقم');
          });
        }
        closeSheet();
      };
    });
  });
});
</script>
